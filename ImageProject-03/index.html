<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-assets>
        <img id="sky" src="assets/Beach.jpeg" alt="">
        <a-assets-item id="umbrella" src="assets/Umbrella.obj" alt=""></a-assets-item>
        <img id="umbrellaT" src="Assets/Umbrella.jpg" alt="">
        <a-assets-item id="chair" src="assets/chair.obj" alt=""></a-assets-item>
        <img id="bball" src="assets/bball.jpg" alt="">
    </a-assets> 
    <a-scene>
      <a-obj-model src="#umbrella" position="0 -25 -50" scale=".25 .25 .25" rotation="270" material="shader:flat;src:#umbrellaT"></a-obj-model>
      <a-obj-model src="#chair" position="10 -25 -50" rotation="0 -110" scale="20 20 20" color="#37d" ></a-obj-model>
      <a-sphere src="#bball" position="-5 -25 -45" rotation="30 -20 60" scale="3 3 3"></a-sphere>
      <a-sky src="#sky"></a-sky>

      <a-light light="color: #ffffff; intensity: 300; type: point"></a-light>
    </a-scene>
  </body>
</html>
