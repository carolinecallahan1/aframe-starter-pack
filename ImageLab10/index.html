<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="sky" src="assets/sandy.jpg" alt="">
        <img id="sand" src="assets/sand.webp" alt="">
        <img id="red" src="assets/red.jpg" alt="">
        <img id="crab" src="assets/crab.jpg" alt="">
      </a-assets>
      <a-box src="#sand" position="0 0 -4"></a-box>
      <a-box src="#sand" position="-1 0 -4"></a-box>
      <a-box src="#sand" position="1 0 -4"></a-box>
      <a-box src="#sand" position="0 1 -4"></a-box>
      <a-cone src="#sand" position="0 1.5 -4"radius-bottom="0.5" radius-top="0" height="2" rotation="0 90"></a-cone>
      <a-cone src="#sand" position="1 1 -4"radius-bottom="0.25" radius-top="0" height="1" rotation="0 90"></a-cone>
      <a-cone src="#sand" position="-1 1 -4"radius-bottom="0.25" radius-top="0" height="1" rotation="0 90"></a-cone>
      <a-cone src="#red" position="0.5 2.75 -4"radius-bottom="0.25" radius-top="0" height="1" rotation="90 90 0"></a-cone>
      <a-sphere src="#crab" position="-1.25 0 -3" radius="0.25" rotation="0 -50"></a-sphere>
      <a-sky src="#sky"></a-sky>
    </a-scene>
  </body>
</html>
